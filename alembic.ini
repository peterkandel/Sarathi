[alembic]
# Root Alembic entrypoint for the identity service migration tree.
script_location = services/identity_service/alembic
prepend_sys_path = services/identity_service
sqlalchemy.url = postgresql+asyncpg://sarathi:sarathi_password@localhost:5432/sarathi

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s