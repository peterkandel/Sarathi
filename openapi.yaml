openapi: 3.1.0
info:
  title: Nagarik App Platform API
  version: 1.0.0
  summary: Consolidated OpenAPI specification for the Nagarik App service platform.
  description: |
    This specification defines versioned REST APIs for the Nagarik App platform.
    It consolidates the public service surfaces for identity and consent, document intake,
    OCR extraction, tax guidance, application tracking, service orchestration, notifications,
    reference policy, and audit records.
servers:
  - url: https://api.nagarik.gov.np/v1
    description: Primary government production API
  - url: https://staging-api.nagarik.gov.np/v1
    description: Staging API
security:
  - bearerAuth: []

tags:
  - name: BFF
    description: Backend-for-frontend APIs used by the mobile application.
  - name: Identity & Consent
    description: Citizen identity, consent, and authorization scope management.
  - name: Document Intake
    description: Citizenship document capture and submission.
  - name: OCR
    description: Document OCR and extraction processing.
  - name: Tax Guidance
    description: Tax estimation and payment guidance.
  - name: Application Tracking
    description: Citizen-visible application tracking.
  - name: Service Orchestration
    description: Cross-agency service journey orchestration.
  - name: Notification
    description: Official citizen inbox and notification delivery.
  - name: Reference Policy
    description: Governed reference data and service catalog.
  - name: Audit & Records
    description: Audit, records, and evidence APIs.

paths:
  /auth/exchange:
    post:
      tags: [BFF]
      operationId: exchangeAuthToken
      summary: Exchange a client token for a platform session token.
      description: Versioned login bootstrap for the mobile app.
      security: []
      x-authorization-requirements:
        - Public endpoint
        - Requires valid upstream identity provider token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthExchangeRequest'
      responses:
        '200':
          description: Token exchange completed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthExchangeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /me:
    get:
      tags: [BFF]
      operationId: getDashboardIdentity
      summary: Get the authenticated citizen profile summary.
      x-authorization-requirements:
        - Valid bearer token
        - Citizen or delegated support access
      responses:
        '200':
          description: Authenticated identity summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CitizenSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /dashboard:
    get:
      tags: [BFF]
      operationId: getDashboard
      summary: Get aggregated citizen dashboard data.
      x-authorization-requirements:
        - Valid bearer token
        - Citizen access only
      responses:
        '200':
          description: Aggregated dashboard payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /notifications/summary:
    get:
      tags: [BFF]
      operationId: getNotificationSummary
      summary: Get aggregated notification summary for the dashboard.
      x-authorization-requirements:
        - Valid bearer token
        - Citizen access only
      responses:
        '200':
          description: Notification summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /applications/summary:
    get:
      tags: [BFF]
      operationId: getApplicationSummary
      summary: Get aggregated application summary for the dashboard.
      x-authorization-requirements:
        - Valid bearer token
        - Citizen access only
      responses:
        '200':
          description: Application summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /support/requests:
    post:
      tags: [BFF]
      operationId: createSupportRequest
      summary: Create a support request from the mobile client.
      x-authorization-requirements:
        - Valid bearer token
        - Citizen or support-assisted session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SupportRequestCreateRequest'
      responses:
        '201':
          description: Support request created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportRequestCreateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /identity/me:
    get:
      tags: [Identity & Consent]
      operationId: getIdentityMe
      summary: Get the authenticated citizen identity profile.
      x-authorization-requirements:
        - Valid bearer token
        - Citizen access
      responses:
        '200':
          description: Citizen identity profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CitizenProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /identity/link:
    post:
      tags: [Identity & Consent]
      operationId: linkIdentity
      summary: Link a trusted external identity to the citizen profile.
      x-authorization-requirements:
        - Valid bearer token
        - Citizen access
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IdentityLinkRequest'
      responses:
        '201':
          description: Identity link created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityLinkResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /consents:
    get:
      tags: [Identity & Consent]
      operationId: listConsents
      summary: List citizen consents.
      x-authorization-requirements:
        - Valid bearer token
        - Citizen or delegated support access
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Paginated consent list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsentListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Identity & Consent]
      operationId: createConsent
      summary: Grant a consent record.
      x-authorization-requirements:
        - Valid bearer token
        - Citizen access
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsentCreateRequest'
      responses:
        '201':
          description: Consent granted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /consents/{consentId}:
    delete:
      tags: [Identity & Consent]
      operationId: revokeConsent
      summary: Revoke a consent record where legally permitted.
      x-authorization-requirements:
        - Valid bearer token
        - Citizen access
      parameters:
        - $ref: '#/components/parameters/ConsentId'
      responses:
        '204':
          description: Consent revoked.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /preferences/notifications:
    get:
      tags: [Identity & Consent]
      operationId: getNotificationPreferences
      summary: Get notification preferences.
      x-authorization-requirements:
        - Valid bearer token
        - Citizen access
      responses:
        '200':
          description: Communication preferences.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunicationPreferenceListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    put:
      tags: [Identity & Consent]
      operationId: updateNotificationPreferences
      summary: Update notification preferences.
      x-authorization-requirements:
        - Valid bearer token
        - Citizen access
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommunicationPreferenceUpdateRequest'
      responses:
        '200':
          description: Preferences updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunicationPreferenceListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /authorization-scopes:
    get:
      tags: [Identity & Consent]
      operationId: listAuthorizationScopes
      summary: List authorization scopes.
      x-authorization-requirements:
        - Valid bearer token
        - Citizen access or delegated support access
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Paginated authorization scope list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorizationScopeListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /documents/capture-sessions:
    post:
      tags: [Document Intake]
      operationId: createCaptureSession
      summary: Create a document capture session.
      x-authorization-requirements:
        - Valid bearer token
        - Citizen access
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CaptureSessionCreateRequest'
      responses:
        '201':
          description: Capture session created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaptureSessionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /documents/capture-sessions/{captureSessionId}:
    get:
      tags: [Document Intake]
      operationId: getCaptureSession
      summary: Get a document capture session.
      x-authorization-requirements:
        - Valid bearer token
        - Citizen access or support access with scope
      parameters:
        - $ref: '#/components/parameters/CaptureSessionId'
      responses:
        '200':
          description: Capture session detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaptureSessionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /documents/capture-sessions/{captureSessionId}/images:
    post:
      tags: [Document Intake]
      operationId: uploadCaptureSessionImage
      summary: Upload an image for a capture session.
      x-authorization-requirements:
        - Valid bearer token
        - Citizen access
      parameters:
        - $ref: '#/components/parameters/CaptureSessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CaptureSessionImageUploadRequest'
      responses:
        '201':
          description: Image stored.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaptureSessionImageUploadResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '422':
          $ref: '#/components/responses/ValidationError'

  /documents/capture-sessions/{captureSessionId}/submit-for-extraction:
    post:
      tags: [Document Intake]
      operationId: submitCaptureSessionForExtraction
      summary: Submit a capture session for OCR extraction.
      x-authorization-requirements:
        - Valid bearer token
        - Citizen access
      parameters:
        - $ref: '#/components/parameters/CaptureSessionId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitForExtractionRequest'
      responses:
        '202':
          description: Extraction requested.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentSubmissionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

  /documents/submissions/{submissionId}:
    get:
      tags: [Document Intake]
      operationId: getDocumentSubmission
      summary: Get a document submission.
      x-authorization-requirements:
        - Valid bearer token
        - Citizen access or support access with scope
      parameters:
        - $ref: '#/components/parameters/SubmissionId'
      responses:
        '200':
          description: Submission detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentSubmissionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /documents/submissions/{submissionId}/confirm:
    post:
      tags: [Document Intake]
      operationId: confirmDocumentSubmission
      summary: Confirm a document submission.
      x-authorization-requirements:
        - Valid bearer token
        - Citizen access or authorized officer access
      parameters:
        - $ref: '#/components/parameters/SubmissionId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmSubmissionRequest'
      responses:
        '200':
          description: Submission confirmed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentSubmissionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

  /documents/{documentId}/reject:
    post:
      tags: [Document Intake]
      operationId: rejectDocument
      summary: Reject a document submission.
      x-authorization-requirements:
        - Valid bearer token
        - Authorized officer access
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RejectDocumentRequest'
      responses:
        '200':
          description: Document rejected.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RejectDocumentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

  /documents/history:
    get:
      tags: [Document Intake]
      operationId: listDocumentHistory
      summary: List document capture history.
      x-authorization-requirements:
        - Valid bearer token
        - Citizen access or delegated support access
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Paginated document history.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentHistoryListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /extractions:
    post:
      tags: [OCR]
      operationId: createExtractionJob
      summary: Create an OCR extraction job.
      x-authorization-requirements:
        - Valid bearer token
        - System-to-system access from Document Intake
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExtractionJobCreateRequest'
      responses:
        '202':
          description: Extraction job accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtractionJobResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /extractions/{extractionJobId}:
    get:
      tags: [OCR]
      operationId: getExtractionJob
      summary: Get an OCR extraction job.
      x-authorization-requirements:
        - Valid bearer token
        - System-to-system access from Document Intake or Audit access
      parameters:
        - $ref: '#/components/parameters/ExtractionJobId'
      responses:
        '200':
          description: Extraction job detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtractionJobResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /extractions/{extractionJobId}/reprocess:
    post:
      tags: [OCR]
      operationId: reprocessExtractionJob
      summary: Reprocess an OCR extraction job.
      x-authorization-requirements:
        - Valid bearer token
        - Authorized operator access
      parameters:
        - $ref: '#/components/parameters/ExtractionJobId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReprocessExtractionRequest'
      responses:
        '202':
          description: Reprocess requested.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtractionJobResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /extractions/{extractionJobId}/confidence:
    get:
      tags: [OCR]
      operationId: getExtractionConfidence
      summary: Get confidence details for an extraction job.
      x-authorization-requirements:
        - Valid bearer token
        - System-to-system access from Document Intake or Audit access
      parameters:
        - $ref: '#/components/parameters/ExtractionJobId'
      responses:
        '200':
          description: Confidence details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtractionConfidenceResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /tax/estimates:
    post:
      tags: [Tax Guidance]
      operationId: createTaxEstimate
      summary: Create a tax estimate.
      x-authorization-requirements:
        - Valid bearer token
        - Citizen access
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaxEstimateCreateRequest'
      responses:
        '201':
          description: Tax estimate created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaxEstimateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /tax/estimates/{estimateId}:
    get:
      tags: [Tax Guidance]
      operationId: getTaxEstimate
      summary: Get a tax estimate.
      x-authorization-requirements:
        - Valid bearer token
        - Citizen access or delegated support access
      parameters:
        - $ref: '#/components/parameters/EstimateId'
      responses:
        '200':
          description: Tax estimate detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaxEstimateResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /tax/estimates/{estimateId}/disclosure:
    get:
      tags: [Tax Guidance]
      operationId: getTaxEstimateDisclosure
      summary: Get the estimate disclosure and calculation basis.
      x-authorization-requirements:
        - Valid bearer token
        - Citizen access or delegated support access
      parameters:
        - $ref: '#/components/parameters/EstimateId'
      responses:
        '200':
          description: Disclosure detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaxEstimateDisclosureResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /tax/obligations:
    get:
      tags: [Tax Guidance]
      operationId: listTaxObligations
      summary: List tax obligations for the authenticated citizen.
      x-authorization-requirements:
        - Valid bearer token
        - Citizen access
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Paginated tax obligation list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaxObligationListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /tax/payment-guidance:
    get:
      tags: [Tax Guidance]
      operationId: getPaymentGuidance
      summary: Get payment guidance for an estimate or category.
      x-authorization-requirements:
        - Valid bearer token
        - Citizen access
      parameters:
        - name: estimate_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: tax_category_code
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Payment guidance detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentGuidanceListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /tax/estimates/{estimateId}/save:
    post:
      tags: [Tax Guidance]
      operationId: saveTaxEstimate
      summary: Save a tax estimate for later use.
      x-authorization-requirements:
        - Valid bearer token
        - Citizen access
      parameters:
        - $ref: '#/components/parameters/EstimateId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveTaxEstimateRequest'
      responses:
        '200':
          description: Estimate saved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaxEstimateResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /tax/estimates/{estimateId}/acknowledge:
    post:
      tags: [Tax Guidance]
      operationId: acknowledgeTaxEstimate
      summary: Acknowledge a tax estimate disclaimer.
      x-authorization-requirements:
        - Valid bearer token
        - Citizen access
      parameters:
        - $ref: '#/components/parameters/EstimateId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcknowledgeTaxEstimateRequest'
      responses:
        '200':
          description: Estimate acknowledged.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaxEstimateAcknowledgementResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /applications/{trackingReference}:
    get:
      tags: [Application Tracking]
      operationId: getApplication
      summary: Get a tracked application.
      x-authorization-requirements:
        - Valid bearer token
        - Citizen access or authorized support access
      parameters:
        - $ref: '#/components/parameters/TrackingReference'
      responses:
        '200':
