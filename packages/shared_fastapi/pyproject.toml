[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "shared-fastapi"
version = "0.1.0"
description = "SARATHI shared FastAPI utilities"
requires-python = ">=3.11"
dependencies = [
  "fastapi>=0.115.0",
  "pydantic>=2.8.0",
  "pydantic-settings>=2.4.0",
  "python-jose[cryptography]>=3.3.0",
  "sqlalchemy>=2.0.30",
  "asyncpg>=0.29.0"
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["shared_fastapi*"]
